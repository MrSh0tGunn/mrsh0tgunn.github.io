<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groepen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6fa;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .group-card {
      display: block;
      text-decoration: none;
      color: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: 0.2s;
    }

    .group-card:hover {
      transform: translateY(-5px);
    }

    .group-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.15);
    }

    .group-content {
      padding: 15px;
    }

    .group-title {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .group-members {
      font-size: 0.95em;
      line-height: 1.6;
      opacity: 0.95;
    }

    .teamA { background: rgb(159, 51, 54); }
    .teamB { background: rgb(57,70,104); }
    .teamC { background: rgb(101, 115, 31); }
    .teamD { background: rgb(229, 140, 45); }
  </style>
</head>

<body>
  <h1>Overzicht Groepen</h1>

  <div class="container">
    <div class="groups-grid">

      <a class="group-card teamA" href="team_A.html">
        <img class="group-image" src="images/team_A.jpeg" alt="Groep A">
        <div class="group-content">
          <div class="group-title">Groep A</div>
          <div class="group-members">
            Médaar Holvoet<br>
            Jore Deweerdt<br>
            Noah Jacobs<br>
            Tom Van Geluwe
          </div>
        </div>
      </a>

      <a class="group-card teamB" href="team_B.html">
        <img class="group-image" src="images/team_B.jpeg" alt="Groep B">
        <div class="group-content">
          <div class="group-title">Groep B</div>
          <div class="group-members">
            Zita Benoit<br>
            Stef T'Jampens<br>
            Warre Ghessele<br>
            Arthur Vannieuwenhuyze
          </div>
        </div>
      </a>

      <a class="group-card teamC" href="team_C.html">
        <img class="group-image" src="images/team_C.jpeg" alt="Groep C">
        <div class="group-content">
          <div class="group-title">Groep C</div>
          <div class="group-members">
            Lucas Verfaillie<br>
            Thibo Denolf<br>
            Noor Debusschere<br>
            Rune Eeman
          </div>
        </div>
      </a>

      <a class="group-card teamD" href="team_D.html">
        <img class="group-image" src="images/team_D.jpeg" alt="Groep D">
        <div class="group-content">
          <div class="group-title">Groep D</div>
          <div class="group-members">
            Kasper Achten<br>
            Wannes De Keyzer<br>
            Tuur Van Steenbrugge<br>
            Celien De Paepe
          </div>
        </div>
      </a>

    </div>
  </div>

  <script src="menu.js"></script>
</body>
</html>
